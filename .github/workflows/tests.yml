name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned: bun 1.3.14's linux-x64 build mis-parses the large
          # unicode-emoji-json JSON import, emptying the emoji dataset and
          # failing the atom tests. 1.3.12 is the last version known-good on
          # this runner (it was green on 2026-04-11). See PR description.
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: |
          bun run format:check

      - name: Run linting
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Build library
        run: bun run build

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match the test job — see note above.
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build library
        run: bun run --cwd packages/emoji-picker build

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: test-results/
          retention-days: 30
